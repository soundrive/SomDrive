<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Seamless vibrant golden-yellow gradient -->
    <linearGradient id="yellow-gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDD00" />
      <stop offset="45%" stop-color="#FFA800" />
      <stop offset="100%" stop-color="#FF7F00" />
    </linearGradient>

    <!-- Neon ambient glow filter for some elements -->
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle canvas matching logo rounded boundaries -->
  <rect width="512" height="512" rx="135" fill="url(#yellow-gold-grad)" />

  <!-- Symmetrical/Clean soundwave bars on left -->
  <g fill="#FFFFFF">
    <!-- Short left bar -->
    <rect x="102" y="215" width="20" height="82" rx="10" />
    <!-- Tall middle bar -->
    <rect x="134" y="165" width="20" height="182" rx="10" />
    <!-- Short right bar -->
    <rect x="166" y="230" width="20" height="52" rx="10" />
  </g>

  <!-- Glowing bright neon green dot on the wave indicator -->
  <circle cx="166" cy="318" r="12" fill="#00E676" filter="url(#glow-effect)" />

  <!-- Gorgeous stylized letter 'S' looping around on the right side -->
  <path d="M 400,180 C 400,135 350,115 300,115 C 245,115 220,150 220,205 C 220,280 390,245 390,315 C 390,370 350,395 295,395 C 240,395 210,355 210,320" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="44" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
